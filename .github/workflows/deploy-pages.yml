name: deploy-pages

# 建置 React SPA + 複製 fundamentals JSON → 部署 GitHub Pages。
# 注意：每日 update 用 GITHUB_TOKEN push 不會觸發其他 workflow，
# 故這裡用 schedule(資料更新後)確保 Pages 每日刷新；web 程式碼變更則由 push 觸發。

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "data/fundamentals/**"
      - "data/valuation/**"
      - "data/companies.json"
      - ".github/workflows/deploy-pages.yml"
  schedule:
    - cron: "30 9 * * *" # 台灣 17:30，晚於資料更新(17:00)
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: 複製資料到 dist (只放網頁需要的)
        run: |
          mkdir -p web/dist/data/fundamentals web/dist/data/valuation
          cp data/fundamentals/*.json web/dist/data/fundamentals/
          cp data/valuation/_latest.json web/dist/data/valuation/
          cp data/companies.json web/dist/data/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
