name: refresh-sectors

# 手動刷新 CMoney 子類股分類(分類少變,不進每日排程)。
# scrape -> 重算嵌入 fundamentals -> 有變更才 commit -> 觸發 Pages 部署。

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write # 用來 dispatch deploy-pages

concurrency:
  group: refresh-sectors
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 爬 CMoney 分類 (全空會自動中止,不蓋好資料)
        run: node scripts/scrape_categories.mjs

      - name: 重算 (把 sector 嵌入 fundamentals)
        run: python metrics.py

      - name: 有變更才 commit & push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "分類無變更，跳過。"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: 刷新 CMoney 子類股 $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 觸發 Pages 重新部署
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref master
